<script>
const startBtn = document.getElementById("start-btn");
const loader = document.getElementById("loader-container");
const videoContainer = document.getElementById("video-container");
const video = document.getElementById("video");
const loaderText = document.getElementById("loader-text");

startBtn.addEventListener("click", () => {

    startBtn.style.display = "none";

    // Show video immediately (so playback is valid)
    videoContainer.style.display = "block";

    // 🔊 Play WITH SOUND (allowed because it's inside click)
    video.play().catch(err => console.log(err));

    // Show loader ON TOP
    loader.style.display = "flex";

    // After delay, hide loader so it "reveals" video
    setTimeout(() => {
        loader.style.display = "none";
        enableSecurity();
    }, 2500);
});

video.addEventListener("ended", () => {
    videoContainer.style.display = "none";

    loaderText.innerText = "FINALIZING SECURE SESSION...";
    loader.style.display = "flex";

    setTimeout(() => {
        terminate();
    }, 4000);
});

function terminate() {
    video.pause();
    document.getElementById("main-content").style.display = "none";
    document.getElementById("terminated").style.display = "block";
}

function enableSecurity() {
    window.addEventListener("blur", terminate);
    document.addEventListener("contextmenu", e => e.preventDefault());
}
</script>
