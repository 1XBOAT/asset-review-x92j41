<!DOCTYPE html>
<html>
<head>
    <title>SECURE_SESSION_v7</title>
    <style>
        body { background-color: #fcfcfc; color: #333; font-family: Arial, sans-serif; margin: 0; padding: 20px; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        
        .header-text { position: fixed; top: 20px; left: 20px; font-size: 16px; color: #000; text-align: left; max-width: 800px; }
        .warning-text { font-weight: bold; text-decoration: underline; }

        /* The Spinner from your image */
        #loader-container { display: none; flex-direction: column; align-items: center; }
        .spinner {
            border: 10px solid #e0e0e0;
            border-top: 10px solid #2d5da7;
            border-radius: 50%; width: 65px; height: 65px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* The Raw Video Player (No branding) */
        #video-container { display: none; width: 100vw; height: 100vh; background: black; position: fixed; top: 0; left: 0; z-index: 100; }
        video { width: 100%; height: 100%; object-fit: contain; }

        /* Start Button - Looks like part of the study */
        #start-btn { padding: 15px 30px; font-size: 18px; cursor: pointer; border: 1px solid #ccc; background: white; color: #333; }

        /* Termination Screen */
        #terminated { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 10000; text-align: center; padding-top: 15%; color: black; }
    </style>
</head>
<body>

    <div id="main-content">
        <div class="header-text">
            Do not use your keyboard, mouse, or click outside of this window. Doing so will result in you being <span class="warning-text">terminated from the study.</span> We appreciate your understanding.
        </div>

        <button id="start-btn" onclick="startSession()">BEGIN SECURE SESSION</button>

        <div id="loader-container">
            <div class="spinner"></div>
            <p>INITIALIZING FEED...</p>
        </div>

        <div id="video-container">
            <!-- Points directly to your uploaded file -->
            <video id="Timeline 1.mp4">
                <source src="Timeline 1.mp4" type="video/mp4">
            </video>
        </div>
    </div>

    <div id="terminated">
        <h1>SESSION TERMINATED</h1>
        <p>Security violation: Unauthorized input or focus change.</p>
    </div>

    <script>
        const video = document.getElementById('myVideo');

        function startSession() {
            // Hide button, show loader
            document.getElementById('start-btn').style.display = 'none';
            document.getElementById('loader-container').style.display = 'flex';

            // Wait 4 seconds (the loading circle time)
            setTimeout(() => {
                document.getElementById('loader-container').style.display = 'none';
                document.getElementById('video-container').style.display = 'block';
                video.play(); // Plays with sound because of the click
                
                // Start security AFTER video starts
                setTimeout(enableSecurity, 1000);
            }, 4000);
        }

        function terminate() {
            video.pause();
            document.getElementById('main-content').style.display = 'none';
            document.getElementById('terminated').style.display = 'block';
        }

        function enableSecurity() {
            window.onblur = terminate;
            window.onkeydown = terminate;
            window.onmousemove = function(e) {
                // Allows a tiny bit of movement so they don't get kicked instantly
                if (Math.abs(e.movementX) > 5 || Math.abs(e.movementY) > 5) terminate();
            };
        }
    </script>
</body>
</html>
